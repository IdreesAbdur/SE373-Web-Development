<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee GraphQL Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Employee Manager (GraphQL)</h1>

      <form id="employeeForm" class="form">
        <input type="hidden" id="employeeId" />

        <div class="row">
          <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required />
          </div>

          <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="department">Department</label>
            <select id="department" required>
              <option value="">Select Department</option>
              <option value="IT">IT</option>
              <option value="HR">HR</option>
              <option value="Finance">Finance</option>
            </select>
          </div>

          <div class="field">
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" required />
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="jobTitle">Job Title</label>
            <input type="text" id="jobTitle" required />
          </div>

          <div class="field">
            <label for="salary">Salary</label>
            <input type="number" id="salary" required />
          </div>
        </div>

        <div class="button-row">
          <button type="submit" id="submitBtn">Add Employee</button>
          <button type="button" id="cancelEditBtn" class="secondary hidden">
            Cancel Edit
          </button>
        </div>
      </form>

      <p id="message" class="message"></p>

      <h2>Employees</h2>
      <table>
        <thead>
          <tr>
            <th>First</th>
            <th>Last</th>
            <th>Department</th>
            <th>Start Date</th>
            <th>Job Title</th>
            <th>Salary</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="employeeTableBody"></tbody>
      </table>
    </div>

    <script src="app.js"></script>
  </body>
</html>
